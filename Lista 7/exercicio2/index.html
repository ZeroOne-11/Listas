<!DOCTYPE html>
<html lang="pt_BR">
<head>
<meta charset="UTF-8">
<title>Formulário</title>
<link rel="stylesheet" href="style.css">
</head>
<body>



<table class="formulario">

    <!-- Topo da tabela (PARTE AZUL)   -->
        <tr> <!--Cria uma linha da tabela-->
            <td colspan="3" class="topo-claro">   <!--a linha azul claro ocupa 3 colunas   -->
                Não é associado? Faça seu cadastro
            </td> <!--Cria a coluna-->
            
            <td class="topo-escuro"></td>
        </tr>

        <tr>
            <td>Nome</td> <!--Formato TEXTO-->
            <td colspan="3"><input type="text" id="ipNome"></td>
        </tr>

        <tr>
            <td>Nome Completo</td>
            <td colspan="3"><input type="text" id="ipNomeCompleto"></td>
        </tr>

        <tr>
            <td>CPF</td>
            <td colspan="3"><input type="text" id="ipCPF"></td>
        </tr>

        <tr>
            <td>E-mail</td>  <!--Formato para email-->
            <td colspan="3"><input type="email" id="ipEmail"></td>
        </tr>

        <tr>
            <td>WebSite</td> <!--Formato URL(aceita endereços web validos)-->
            <td colspan="3"><input type="url" id="ipWebsite"></td>
        </tr>

        <tr>
            <td>Endereço</td> 
            <td colspan="3"><input type="text" id="ipEndereco"></td>
        </tr>

        <tr>
            <td>Bairro</td>
            <td><input type="text" id="ipBairro"></td>
            <td>Cidade</td>
            <td><input type="text" id="ipCidade"></td>
        </tr>

        <tr>
            <td>Cep</td>
            <td><input type="text" id="ipCep"></td>
            <td>UF</td>
            <td>
                <select id="ipUF"> <!--Serve para escolher apenas uma opção -->
                    <option>AC</option> 
                    <option>AL</option> 
                    <option>AP</option> 
                    <option>AM</option>
                    <option>BA</option>
                    <option>CE</option>
                    <option>DF</option>
                    <option>ES</option>
                    <option>GO</option>
                    <option>MA</option>
                    <option>MT</option>
                    <option>MS</option>
                    <option>MG</option>
                    <option>PA</option>
                    <option>PB</option>
                    <option>PR</option>
                    <option>PE</option>
                    <option>PI</option>
                    <option>RJ</option>
                    <option>RN</option>
                    <option>RS</option>
                    <option>RO</option>
                    <option>RR</option>
                    <option>SC</option>
                    <option>SP</option>
                    <option>SE</option> 
                    <option>TO</option>
                </select>
            </td>
        </tr>

        <tr>
            <td>Telefone</td> <!--Formato para telefone-->
            <td><input type="tel" id="ipTelefone"></td>
            <td>Fax</td>
            <td><input type="text" id="ipFax"></td>
        </tr>

        <tr>
            <td>Data Nascimento</td> <!--Formato para data (calendário)-->
            <td><input type="date" id="ipDataNascimento"></td>

            <td>Sexo</td>
        <td> <!--Lista suspensa de botão (.) PODE ESCOLHER APENAS UMA OPÇÃO -->
                <input type="radio" name="sexo"> M
                <input type="radio" name="sexo"> F
            </td>
        </tr>

        <tr>
            <td>Celular</td> 
            <td><input type="tel" id="ipCelular"></td>
            <td>Est.Civil</td>
            <td>
                <select id="ipEstadoCivil">
                    <option>Solteiro</option>
                    <option>Casado</option>
                    <option>Divorciado</option>
                    <option>Viúvo</option>
                </select>
            </td>
        </tr>

        <tr>
            <td>Login</td>
            <td><input type="text" id="ipLogin"></td>
            <td>Senha</td>
            <td><input type="password" id="ipSenha"></td>
        </tr>

        <tr>
            <td colspan="4"> 
                Deseja receber informações sobre os seguintes assuntos abaixo:
            </td>
        </tr>

        <tr>
            <td colspan="4"> <!--Permite marcarvarias oplçoes ao mesmo  tempo-->
                <label>
                    <input type="checkbox"> Tecnologia
                    <input type="checkbox"> Esportes
                    <input type="checkbox"> Automóveis
                    <input type="checkbox"> Culinária
                    <input type="checkbox"> Política
                    <input type="checkbox"> Policial
                    <input type="checkbox"> Tempo
                </label>
            </td>
        </tr>

        <tr>
            <td colspan="4">
                
                    <input type="checkbox"> Cultura
                    <input type="checkbox"> Economia
                    <input type="checkbox"> Jogos
                    <input type="checkbox"> Educação
                    <input type="checkbox"> Viagem
                    <input type="checkbox"> Empregos
                    <input type="checkbox"> Moda e Estilo
                </label>
            </td>
        </tr>

        <tr>
            <td colspan="4">  <!--Usuario deve concordar com as regras para poder mandaro formulario-->
                 <label>
                    <input type="checkbox" required>
                    Li as regras de cadastro e autorizo a criação do usuário
                </label>
            </td>
        </tr>

        <tr>
            <td colspan="4"> 
                <input type="submit" value="Confirmar">
                <input type="reset" value="Retornar">
            </td>
        </tr>

    </table>

</body>
</html>
