<!doctype html>
<html lang="pt_BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Site do Victor Luz</title>
    <link rel="short icon" href="../imagens/imagen.ico" />
    <link rel="stylesheet" type="text/css" href="style.css" />
  </head>
  <body>
    <main>
      <section>
        <form id="formulario" action="respFormulario.html" method="post">
          <fieldset>
            <legend>Personal Details</legend>

            <fieldset>
              <legend>Address Details</legend>

              <label for="LbCidade">City:</label>
              <input type="text" id="ipCidade" required />

              <label for="zip">Zip Code:</label>
              <input type="text" id="zip" required />
            </fieldset>

            <fieldset>
              <legend>Telephone Details</legend>

              <label for="LbHome">Home:</label>
              <input type="text" id="ipHome" required />

              <label for="LbCelular">Cell Phone:</label>
              <input type="tel" id="ipCelular" required />
            </fieldset>
          </fieldset>
        </form>
      </section>
    </main>
  </body>
</html>
